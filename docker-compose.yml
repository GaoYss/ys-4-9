services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      SQLITE_PATH: "/data/db.sqlite3"
    volumes:
      - backend_data:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "/api"
      VITE_PROXY_TARGET: "http://backend:8000"
    depends_on:
      - backend

volumes:
  backend_data:
